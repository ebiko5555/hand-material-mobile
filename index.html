<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>手を、ひらく</title>
<style>
:root{color-scheme:light;--milk:#f1ece3;--skin:#d8c6b6;--shadow:#718b86;--rose:#c99591;--ink:#403b36}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#cfc6ba;color:var(--ink)}
body{font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{font:inherit}
#camera,#art,#three,#shade{position:fixed;inset:0;width:100%;height:100%}
#camera{z-index:0;object-fit:cover;opacity:.92;filter:saturate(.72) contrast(.92) brightness(1.06) sepia(.05)}
#shade{z-index:1;pointer-events:none;background:radial-gradient(ellipse at 50% 44%,rgba(255,250,242,.04) 12%,rgba(108,99,88,.08) 68%,rgba(65,61,57,.25) 100%),linear-gradient(160deg,rgba(244,232,218,.1),rgba(111,137,132,.07) 62%,rgba(197,143,139,.07))}
#three{z-index:2;pointer-events:none}
#art{z-index:3;pointer-events:none}
#invitation,#reflection{position:fixed;left:24px;right:24px;z-index:5;text-align:center;pointer-events:none;font-weight:400;letter-spacing:.18em;text-shadow:0 1px 12px rgba(255,250,242,.5);opacity:0;transition:opacity 2.2s ease}
#invitation{bottom:max(11vh,calc(44px + env(safe-area-inset-bottom)));font-size:14px;color:rgba(54,49,44,.76)}
#reflection{top:50%;transform:translateY(-50%);font-size:17px;line-height:2;color:rgba(55,48,43,.84)}
#invitation.is-visible,#reflection.is-visible{opacity:1}
#camera-switch{position:fixed;z-index:6;right:14px;top:max(12px,env(safe-area-inset-top));min-width:44px;min-height:44px;border:0;background:transparent;color:rgba(57,52,47,.42);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:9px;letter-spacing:.12em;opacity:0;pointer-events:none;transition:opacity 1.4s ease}
#camera-switch.is-ready{opacity:.46;pointer-events:auto}
#camera-switch.is-dim{opacity:.12}
#camera-switch:focus-visible{opacity:.8;outline:1px solid rgba(64,59,54,.3);outline-offset:-5px}
#start{position:fixed;inset:0;z-index:10;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 28% 22%,rgba(255,250,243,.94),transparent 34%),radial-gradient(circle at 77% 72%,rgba(185,205,199,.34),transparent 43%),linear-gradient(145deg,#eee6db 0%,#ddd1c3 57%,#cdbfb2 100%);transition:opacity 2.4s cubic-bezier(.22,.61,.36,1),visibility 0s linear 2.4s}
#start::after{content:"";position:absolute;inset:8%;border:1px solid rgba(93,79,68,.08);pointer-events:none}
#start.is-leaving{opacity:0;visibility:hidden;pointer-events:none}
#start-inner{position:relative;width:min(86vw,440px);padding:42px 30px 88px;text-align:center}
#start h1{margin:0 0 56px;font-weight:400;font-size:clamp(21px,5.8vw,28px);line-height:1.9;letter-spacing:.25em;text-indent:.25em;color:rgba(57,50,44,.9)}
#start h1 span{display:block}
#start-button{min-height:48px;padding:10px 8px;border:0;border-bottom:1px solid rgba(64,55,49,.42);border-radius:0;background:transparent;color:rgba(57,50,44,.78);font-size:13px;letter-spacing:.22em;cursor:pointer;transition:color .8s ease,border-color .8s ease,opacity .8s ease}
#start-button:disabled{opacity:.38}
#start-button:focus-visible{outline:1px solid rgba(64,55,49,.28);outline-offset:8px}
#start-message{min-height:3.4em;margin:24px auto 0;max-width:27em;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:10px;line-height:1.7;letter-spacing:.08em;color:rgba(62,55,49,.6)}
#privacy{margin:20px 0 0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:9px;letter-spacing:.1em;color:rgba(62,55,49,.36)}
#credit{position:absolute;left:24px;right:24px;bottom:max(18px,env(safe-area-inset-bottom));margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:8px;line-height:1.5;letter-spacing:.04em;color:rgba(62,55,49,.33)}
#credit a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(62,55,49,.18)}
@media (max-height:600px){#start h1{margin-bottom:34px}#start-inner{padding-top:30px;padding-bottom:70px}#privacy{margin-top:12px}}
@media (prefers-reduced-motion:reduce){#start,#invitation,#reflection,#camera-switch{transition-duration:.01ms}}
</style>
</head>
<body>
<video id="camera" autoplay muted playsinline></video>
<canvas id="three"></canvas>
<canvas id="art"></canvas>
<div id="shade"></div>
<div id="invitation" aria-live="polite">手を、ひらいてください</div>
<div id="reflection">いま、自分の手を見てください</div>
<button id="camera-switch" type="button" aria-label="カメラを切り替える">カメラ</button>
<div id="start">
  <div id="start-inner">
    <h1><span>手を、ひらいて</span><span>ください</span></h1>
    <button id="start-button" type="button">手をひらく</button>
    <p id="start-message" role="status" aria-live="polite"></p>
    <p id="privacy">カメラの映像は保存されません</p>
  </div>
  <p id="credit">3Dモデル “Hand” by <a href="https://sketchfab.com/o0i0o" target="_blank" rel="noreferrer">phi</a> / <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noreferrer">CC BY 4.0</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const video=document.querySelector('#camera');
const canvas=document.querySelector('#art');
const ctx=canvas.getContext('2d');
const threeCanvas=document.querySelector('#three');
const invitation=document.querySelector('#invitation');
const reflection=document.querySelector('#reflection');
const startScreen=document.querySelector('#start');
const startButton=document.querySelector('#start-button');
const startMessage=document.querySelector('#start-message');
const cameraSwitch=document.querySelector('#camera-switch');
let W=0,H=0,dpr=1,running=false,processing=false,mirrored=false,currentDeviceId='',currentFacingMode='';
let points=null,lastSeen=0;
let materialization=0,motion=.5,hadHand=false,reflectionShown=false;
let reflectionTimer=0,cameraSwitchTimer=0;
const trails=Array.from({length:5},()=>[]);
const fingers=[[0,1,2,3,4],[0,5,6,7,8],[0,9,10,11,12],[0,13,14,15,16],[0,17,18,19,20]];
const palm=[0,1,5,9,13,17,0];
const bones=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
const clamp=(value,min=0,max=1)=>Math.max(min,Math.min(max,value));
const smoothstep=(edge0,edge1,value)=>{const x=clamp((value-edge0)/(edge1-edge0));return x*x*(3-2*x)};

// ---------- 3D artwork tracking rig ----------
const renderer3=new THREE.WebGLRenderer({canvas:threeCanvas,alpha:true,antialias:true});
renderer3.setPixelRatio(Math.min(devicePixelRatio||1,2));
renderer3.outputEncoding=THREE.sRGBEncoding;
renderer3.toneMapping=THREE.ACESFilmicToneMapping;
renderer3.toneMappingExposure=.92;
renderer3.setClearColor(0x000000,0);
const scene3=new THREE.Scene();
const camera3=new THREE.OrthographicCamera(0,innerWidth,0,innerHeight,-2000,2000);camera3.position.z=800;
scene3.add(new THREE.AmbientLight(0xfff7ec,1.26));
const light3=new THREE.PointLight(0xffead6,1.42,1900);scene3.add(light3);
const fill3=new THREE.PointLight(0xc4dbd4,.7,1700);scene3.add(fill3);
const rim3=new THREE.PointLight(0xe9b9b3,.52,1500);scene3.add(rim3);
const artworkRoot=new THREE.Group();scene3.add(artworkRoot);
const artworkAnchors=Array.from({length:21},()=>{const anchor=new THREE.Group();artworkRoot.add(anchor);return anchor});
let attachedArtwork=null;
const handMaterial=new THREE.MeshPhysicalMaterial({color:0xd9c8b8,roughness:.72,metalness:0,transmission:.08,thickness:.4,ior:1.34,transparent:true,opacity:0,emissive:0x3e322c,emissiveIntensity:.02,depthWrite:false});
const fallbackArtwork=new THREE.Group();artworkRoot.add(fallbackArtwork);
const jointMeshes=Array.from({length:21},(_,i)=>{const mesh=new THREE.Mesh(new THREE.SphereGeometry(i===0?1.25:1,14,10),handMaterial);fallbackArtwork.add(mesh);return mesh});
const boneMeshes=bones.map(()=>{const mesh=new THREE.Mesh(new THREE.CylinderGeometry(1,1,1,12,1),handMaterial);fallbackArtwork.add(mesh);return mesh});
const palmMesh=new THREE.Mesh(new THREE.SphereGeometry(1,20,14),handMaterial);fallbackArtwork.add(palmMesh);
const up3=new THREE.Vector3(0,1,0),a3=new THREE.Vector3(),b3=new THREE.Vector3(),mid3=new THREE.Vector3(),dir3=new THREE.Vector3(),q3=new THREE.Quaternion();

function makeWashTexture(){
  const textureCanvas=document.createElement('canvas');textureCanvas.width=textureCanvas.height=256;
  const paint=textureCanvas.getContext('2d');
  paint.fillStyle='#e7d8c9';paint.fillRect(0,0,256,256);
  let seed=24681357;
  const random=()=>{seed=(seed*1664525+1013904223)>>>0;return seed/4294967296};
  const washes=['rgba(247,238,225,.18)','rgba(184,207,199,.14)','rgba(201,145,140,.1)','rgba(116,101,88,.065)'];
  for(let i=0;i<72;i++){
    const x=random()*256,y=random()*256,r=10+random()*42;
    const wash=paint.createRadialGradient(x,y,0,x,y,r);
    wash.addColorStop(0,washes[i%washes.length]);wash.addColorStop(1,'rgba(255,255,255,0)');
    paint.fillStyle=wash;paint.beginPath();paint.arc(x,y,r,0,Math.PI*2);paint.fill();
  }
  paint.lineCap='round';
  for(let i=0;i<22;i++){
    paint.strokeStyle=i%3===0?'rgba(255,248,237,.15)':'rgba(103,88,76,.035)';
    paint.lineWidth=1+random()*3;paint.beginPath();
    const y=random()*256;paint.moveTo(-12,y);paint.bezierCurveTo(60,y+random()*18-9,174,y+random()*18-9,268,y+random()*14-7);paint.stroke();
  }
  const texture=new THREE.CanvasTexture(textureCanvas);texture.encoding=THREE.sRGBEncoding;texture.needsUpdate=true;return texture;
}
const washTexture=makeWashTexture();

// Blender作品を接続するための入口。21個のanchorがMediaPipeの関節と同じ順番で動く。
window.attachHandArtwork=(object3D)=>{
  if(attachedArtwork)artworkRoot.remove(attachedArtwork);
  attachedArtwork=object3D||null;
  fallbackArtwork.visible=!attachedArtwork;
  if(attachedArtwork)artworkRoot.add(attachedArtwork);
  return {root:artworkRoot,anchors:artworkAnchors};
};
window.handArtworkRig={root:artworkRoot,anchors:artworkAnchors,attach:window.attachHandArtwork};

const artworkMaterials=[];
new THREE.GLTFLoader().load('assets/grasping-hand.glb',gltf=>{
  const model=gltf.scene;
  const box=new THREE.Box3().setFromObject(model),size=box.getSize(new THREE.Vector3()),center=box.getCenter(new THREE.Vector3());
  model.traverse(child=>{
    if(!child.isMesh)return;
    const original=child.material;
    child.material=new THREE.MeshPhysicalMaterial({
      color:0xeadfd3,map:washTexture,normalMap:original.normalMap||null,roughness:.7,metalness:0,
      transmission:.13,thickness:.36,ior:1.34,transparent:true,opacity:0,depthWrite:false,
      emissive:0x4a3d35,emissiveIntensity:.018,side:THREE.DoubleSide
    });
    if(child.material.normalMap)child.material.normalScale.set(.22,.22);
    artworkMaterials.push(child.material);
  });
  const holder=new THREE.Group(),centeredModel=new THREE.Group();
  centeredModel.position.copy(center).multiplyScalar(-1);
  // この作品は前腕が長いため、外接箱の中心ではなく手のひらを追跡位置へ合わせる。
  centeredModel.position.y+=size.y*.18;
  centeredModel.add(model);holder.add(centeredModel);
  holder.userData.updateHandPose=(pose)=>{
    const p0=pose.points[0],p9=pose.points[9],p5=pose.points[5],p17=pose.points[17];
    const palmX=(p0.x+p5.x+p9.x+p17.x)/4,palmY=(p0.y+p5.y+p9.y+p17.y)/4;
    const targetHeight=pose.handScale*3.25,scale=targetHeight/Math.max(size.y,size.z);
    holder.position.set(palmX,palmY,-p9.z*260+8);
    holder.rotation.z=Math.atan2(p9.y-p0.y,p9.x-p0.x)-Math.PI/2;
    holder.scale.setScalar(scale);
    artworkMaterials.forEach(material=>{
      material.opacity=pose.materialization*(.12+pose.materialization*.48);
      material.transmission=.07+pose.materialization*.08;
      material.emissiveIntensity=.012+pose.materialization*.026;
    });
  };
  attachHandArtwork(holder);
},undefined,()=>{
  if(startScreen.classList.contains('is-leaving'))showInvitation('作品を読み込めませんでした');
  else startMessage.textContent='作品を読み込めませんでした。通信環境を確認してください。';
});

function update3DHand(){
  if(!points)return;
  const handScale=Math.max(42,Math.hypot(points[0].x-points[9].x,points[0].y-points[9].y));
  const radius=handScale*.075;
  jointMeshes.forEach((mesh,i)=>{const p=points[i];mesh.position.set(p.x,p.y,-p.z*260);mesh.scale.setScalar(radius*(i===0?1.05:.78));artworkAnchors[i].position.copy(mesh.position)});
  bones.forEach(([a,b],i)=>{const p1=points[a],p2=points[b];a3.set(p1.x,p1.y,-p1.z*260);b3.set(p2.x,p2.y,-p2.z*260);mid3.addVectors(a3,b3).multiplyScalar(.5);dir3.subVectors(b3,a3);const len=dir3.length();boneMeshes[i].position.copy(mid3);boneMeshes[i].scale.set(radius*(a===0?1.18:.72),len,radius*(a===0?1.18:.72));q3.setFromUnitVectors(up3,dir3.normalize());boneMeshes[i].setRotationFromQuaternion(q3)});
  fingers.forEach(finger=>finger.slice(0,-1).forEach((index,j)=>{const next=finger[j+1];dir3.subVectors(artworkAnchors[next].position,artworkAnchors[index].position).normalize();q3.setFromUnitVectors(up3,dir3);artworkAnchors[index].quaternion.copy(q3)}));
  const centerX=(points[0].x+points[9].x+points[13].x)/3,centerY=(points[0].y+points[9].y+points[13].y)/3;
  const angle=Math.atan2(points[9].y-points[0].y,points[9].x-points[0].x)-Math.PI/2;
  palmMesh.position.set(centerX,centerY,-points[9].z*260+3);palmMesh.rotation.z=angle;palmMesh.scale.set(handScale*.34,handScale*.48,radius*1.7);
  handMaterial.opacity=materialization*(.04+materialization*.17);handMaterial.emissiveIntensity=.01+materialization*.025;
  artworkRoot.userData.pose={points,handScale,radius,materialization};
  if(attachedArtwork?.userData?.updateHandPose)attachedArtwork.userData.updateHandPose(artworkRoot.userData.pose,artworkAnchors);
}

function resize(){
  dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
  renderer3.setSize(W,H,false);camera3.right=W;camera3.bottom=H;camera3.updateProjectionMatrix();
  light3.position.set(W*.32,H*.2,560);fill3.position.set(W*.78,H*.55,420);rim3.position.set(W*.82,H*.72,300);
}
addEventListener('resize',resize);resize();
const map=p=>({x:(mirrored?1-p.x:p.x)*W,y:p.y*H,z:p.z||0});
const lerp=(a,b,t)=>a+(b-a)*t;

function update(raw){
  const next=raw.map(map);
  if(!points){points=next;motion=.5}
  else{
    motion=next.reduce((sum,p,i)=>sum+Math.hypot(p.x-points[i].x,p.y-points[i].y),0)/(21*Math.max(W,H));
    points=next.map((p,i)=>({x:lerp(points[i].x,p.x,.44),y:lerp(points[i].y,p.y,.44),z:lerp(points[i].z,p.z,.44)}));
  }
  lastSeen=performance.now();
  if(!hadHand){
    materialization=0;hadHand=true;reflectionShown=false;clearTimeout(reflectionTimer);reflection.classList.remove('is-visible');
  }
  const slowMovement=smoothstep(.0003,.0018,motion)*(1-smoothstep(.0055,.014,motion));
  if(slowMovement>.06){
    [4,8,12,16,20].forEach((tip,i)=>{
      trails[i].unshift({...points[tip],life:.35+slowMovement*.65});trails[i]=trails[i].slice(0,46);
    });
  }
  hideInvitation();
}

function curvedPath(indices,close=false){
  const first=points[indices[0]];ctx.beginPath();ctx.moveTo(first.x,first.y);
  for(let i=1;i<indices.length-1;i++){
    const current=points[indices[i]],next=points[indices[i+1]];
    ctx.quadraticCurveTo(current.x,current.y,(current.x+next.x)/2,(current.y+next.y)/2);
  }
  const last=points[indices[indices.length-1]];ctx.lineTo(last.x,last.y);if(close)ctx.closePath();
}

function drawImprint(t){
  if(!points||materialization<=0)return;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.globalCompositeOperation='source-over';
  const layers=[
    {color:'rgba(255,244,229,.54)',width:1.05,offset:0},
    {color:'rgba(112,140,134,.24)',width:.72,offset:1.6},
    {color:'rgba(190,131,128,.19)',width:.62,offset:-1.35}
  ];
  layers.forEach((layer,index)=>{
    const drift=Math.sin(t*.00042+index*1.7)*layer.offset;
    ctx.save();ctx.translate(drift,-drift*.38);ctx.strokeStyle=layer.color;ctx.lineWidth=layer.width;
    ctx.globalAlpha=materialization*(.38+materialization*.5);
    fingers.forEach(finger=>{curvedPath(finger);ctx.stroke()});
    curvedPath(palm,true);ctx.globalAlpha*=.62;ctx.stroke();ctx.restore();
  });
  ctx.restore();
}

function drawTraces(visible){
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.globalCompositeOperation='source-over';
  const colors=[[126,151,145],[196,151,145],[244,229,211],[154,164,153],[210,169,157]];
  trails.forEach((trail,i)=>{
    if(trail.length>1){
      ctx.beginPath();trail.forEach((p,j)=>{j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});
      const average=trail.reduce((sum,p)=>sum+p.life,0)/trail.length,[r,g,b]=colors[i];
      ctx.strokeStyle=`rgba(${r},${g},${b},${average*.34})`;ctx.lineWidth=.7+i*.08;ctx.stroke();
    }
    trail.forEach(p=>p.life*=visible ? .989 : .982);
    while(trail.length&&trail[trail.length-1].life<.025)trail.pop();
  });
  ctx.restore();
}

function showInvitation(message='手を、ひらいてください'){
  invitation.textContent=message;invitation.classList.add('is-visible');
}
function hideInvitation(){invitation.classList.remove('is-visible')}
function showReflection(){
  if(reflectionShown)return;
  reflectionShown=true;reflection.classList.add('is-visible');clearTimeout(reflectionTimer);
  reflectionTimer=setTimeout(()=>reflection.classList.remove('is-visible'),5200);
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  const visible=running&&points&&performance.now()-lastSeen<720;
  if(visible){
    // 急がず手を置く時間だけが、像を少しずつ深める。
    const stillness=1-smoothstep(.0012,.007,motion);
    materialization=Math.min(1,materialization+.0023*stillness*stillness);
    if(materialization>.82)showReflection();
  }else if(hadHand){
    materialization=Math.max(0,materialization-.0034);
    if(materialization===0){
      hadHand=false;points=null;reflectionShown=false;clearTimeout(reflectionTimer);reflection.classList.remove('is-visible');showInvitation();
    }
  }
  drawTraces(visible);
  if(points&&materialization>0)drawImprint(t);
  scene3.visible=Boolean(points&&materialization>.002);update3DHand();renderer3.render(scene3,camera3);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.65,minTrackingConfidence:.65});
hands.onResults(r=>{if(r.multiHandLandmarks?.length)update(r.multiHandLandmarks[0])});
async function loop(){if(running&&video.readyState>=2&&!processing){processing=true;try{await hands.send({image:video})}catch(e){}processing=false}requestAnimationFrame(loop)}

async function useCamera(deviceId=''){
  if(video.srcObject)video.srcObject.getTracks().forEach(track=>track.stop());
  const videoOptions=deviceId?{deviceId:{exact:deviceId},width:{ideal:1280},height:{ideal:720}}:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}};
  const stream=await navigator.mediaDevices.getUserMedia({video:videoOptions,audio:false});
  video.srcObject=stream;await video.play();
  const settings=stream.getVideoTracks()[0].getSettings();
  currentDeviceId=settings.deviceId||deviceId;
  currentFacingMode=settings.facingMode||'';mirrored=currentFacingMode==='user';
  video.style.transform=mirrored?'scaleX(-1)':'none';
  points=null;materialization=0;hadHand=false;
}

async function chooseRearCamera(){
  const devices=(await navigator.mediaDevices.enumerateDevices()).filter(device=>device.kind==='videoinput');
  if(devices.length<2)return;
  if(currentFacingMode!=='environment'){
    const rear=devices.find(device=>/(back|rear|environment|背面|外側)/i.test(device.label))||devices.find(device=>!/(front|user|前面|内側)/i.test(device.label)&&device.deviceId!==currentDeviceId);
    if(rear&&rear.deviceId!==currentDeviceId)await useCamera(rear.deviceId);
  }
  cameraSwitch.classList.add('is-ready');clearTimeout(cameraSwitchTimer);
  cameraSwitchTimer=setTimeout(()=>cameraSwitch.classList.add('is-dim'),5200);
}

cameraSwitch.onclick=async()=>{
  const devices=(await navigator.mediaDevices.enumerateDevices()).filter(device=>device.kind==='videoinput');
  if(devices.length<2)return;
  const index=devices.findIndex(device=>device.deviceId===currentDeviceId);
  cameraSwitch.classList.remove('is-dim');
  try{await useCamera(devices[(index+1+devices.length)%devices.length].deviceId);showInvitation()}
  catch(e){showInvitation('カメラを切り替えられませんでした')}
};

startButton.onclick=async()=>{
  startButton.disabled=true;startMessage.textContent='カメラを準備しています';
  try{
    await useCamera();await chooseRearCamera();running=true;loop();startMessage.textContent='';startScreen.classList.add('is-leaving');
    setTimeout(()=>showInvitation(),1300);
  }catch(e){
    startButton.disabled=false;
    startMessage.textContent='カメラを使用できませんでした。Safariの設定で、カメラの使用を許可してください。';
  }
};
</script>
</body>
