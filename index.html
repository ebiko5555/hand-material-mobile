<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>手を、ひらく</title>
<style>
:root{color-scheme:light;--milk:#f1ece3;--skin:#d8c6b6;--shadow:#718b86;--rose:#c99591;--ink:#403b36}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#e8dfd4;color:var(--ink)}
body{font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{font:inherit}
#camera,#art,#three,#shade{position:fixed;inset:0;width:100%;height:100%}
#camera{z-index:0;object-fit:cover;opacity:.92;filter:saturate(.68) contrast(.89) brightness(1.03) sepia(.04)}
#shade{z-index:1;pointer-events:none;background:radial-gradient(ellipse at 50% 44%,rgba(255,250,242,.04) 12%,rgba(108,99,88,.08) 68%,rgba(65,61,57,.25) 100%),linear-gradient(160deg,rgba(244,232,218,.1),rgba(111,137,132,.07) 62%,rgba(197,143,139,.07))}
#three{z-index:2;pointer-events:none}
#art{z-index:3;pointer-events:none}
#invitation,#reflection{position:fixed;left:24px;right:24px;z-index:5;text-align:center;pointer-events:none;font-weight:400;letter-spacing:.18em;text-shadow:0 1px 12px rgba(255,250,242,.5);opacity:0;transition:opacity 2.2s ease}
#invitation{bottom:max(11vh,calc(44px + env(safe-area-inset-bottom)));font-size:14px;color:rgba(54,49,44,.76)}
#reflection{top:50%;transform:translateY(-50%);font-size:17px;line-height:2;color:rgba(55,48,43,.84)}
#invitation.is-visible,#reflection.is-visible{opacity:1}
#camera-switch{position:fixed;z-index:6;right:14px;top:max(12px,env(safe-area-inset-top));min-width:44px;min-height:44px;border:0;background:transparent;color:rgba(57,52,47,.42);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:9px;letter-spacing:.12em;opacity:0;pointer-events:none;transition:opacity 1.4s ease}
#camera-switch.is-ready{opacity:.46;pointer-events:auto}
#camera-switch.is-dim{opacity:.12}
#camera-switch:focus-visible{opacity:.8;outline:1px solid rgba(64,59,54,.3);outline-offset:-5px}
#start{position:fixed;inset:0;z-index:10;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 28% 22%,rgba(255,250,243,.94),transparent 34%),radial-gradient(circle at 77% 72%,rgba(185,205,199,.34),transparent 43%),linear-gradient(145deg,#eee6db 0%,#ddd1c3 57%,#cdbfb2 100%);transition:opacity 2.4s cubic-bezier(.22,.61,.36,1),visibility 0s linear 2.4s}
#start::after{content:"";position:absolute;inset:8%;border:1px solid rgba(93,79,68,.08);pointer-events:none}
#start.is-leaving{opacity:0;visibility:hidden;pointer-events:none}
#start-inner{position:relative;width:min(86vw,440px);padding:42px 30px;text-align:center}
#start h1{margin:0 0 56px;font-weight:400;font-size:clamp(21px,5.8vw,28px);line-height:1.9;letter-spacing:.25em;text-indent:.25em;color:rgba(57,50,44,.9)}
#start h1 span{display:block}
#start-button{min-height:48px;padding:10px 8px;border:0;border-bottom:1px solid rgba(64,55,49,.42);border-radius:0;background:transparent;color:rgba(57,50,44,.78);font-size:13px;letter-spacing:.22em;cursor:pointer;transition:color .8s ease,border-color .8s ease,opacity .8s ease}
#start-button:disabled{opacity:.38}
#start-button:focus-visible{outline:1px solid rgba(64,55,49,.28);outline-offset:8px}
#start-message{min-height:3.4em;margin:24px auto 0;max-width:27em;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:10px;line-height:1.7;letter-spacing:.08em;color:rgba(62,55,49,.6)}
#privacy{margin:20px 0 0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:9px;letter-spacing:.1em;color:rgba(62,55,49,.36)}
@media (max-height:600px){#start h1{margin-bottom:34px}#start-inner{padding-top:30px;padding-bottom:30px}#privacy{margin-top:12px}}
@media (prefers-reduced-motion:reduce){#start,#invitation,#reflection,#camera-switch{transition-duration:.01ms}}
</style>
</head>
<body>
<video id="camera" autoplay muted playsinline></video>
<canvas id="three"></canvas>
<canvas id="art"></canvas>
<div id="shade"></div>
<div id="invitation" aria-live="polite">手を、ひらいてください</div>
<div id="reflection">いま、自分の手を見てください</div>
<button id="camera-switch" type="button" aria-label="カメラを切り替える">カメラ</button>
<div id="start">
  <div id="start-inner">
    <h1><span>手を、ひらいて</span><span>ください</span></h1>
    <button id="start-button" type="button">手をひらく</button>
    <p id="start-message" role="status" aria-live="polite"></p>
    <p id="privacy">カメラの映像は保存されません</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script>
const video=document.querySelector('#camera');
const canvas=document.querySelector('#art');
const ctx=canvas.getContext('2d');
const threeCanvas=document.querySelector('#three');
const invitation=document.querySelector('#invitation');
const reflection=document.querySelector('#reflection');
const startScreen=document.querySelector('#start');
const startButton=document.querySelector('#start-button');
const startMessage=document.querySelector('#start-message');
const cameraSwitch=document.querySelector('#camera-switch');
let W=0,H=0,dpr=1,running=false,processing=false,mirrored=false,currentDeviceId='',currentFacingMode='';
let points=null,lastSeen=0,motion=.5,hadHand=false;
let experienceAlpha=0,focusIndex=0,focusProgress=0,cycleComplete=false,completeAt=0,lastFrame=0;
let orbInitialized=false,orbTrailTime=0,reflectionTimer=0,cameraSwitchTimer=0,orbTypeIndex=0,orbTypeChangeTime=0;
const nailTips=[4,8,12,16,20];
const nailBases=[3,7,11,15,19];
const nailReveal=Array(5).fill(0);
const nailTargets=Array(5).fill(0);
const orbTrail=[];
const clamp=(value,min=0,max=1)=>Math.max(min,Math.min(max,value));
const smoothstep=(edge0,edge1,value)=>{const x=clamp((value-edge0)/(edge1-edge0));return x*x*(3-2*x)};
const lerp=(a,b,t)=>a+(b-a)*t;

// ---------- 触覚を想起させる球体と、指先に残る爪 ----------
const renderer3=new THREE.WebGLRenderer({canvas:threeCanvas,alpha:true,antialias:true});
renderer3.setPixelRatio(Math.min(devicePixelRatio||1,2));
renderer3.outputEncoding=THREE.sRGBEncoding;
renderer3.toneMapping=THREE.ACESFilmicToneMapping;
renderer3.toneMappingExposure=.96;
renderer3.setClearColor(0x000000,0);
const scene3=new THREE.Scene();
const camera3=new THREE.OrthographicCamera(0,innerWidth,0,innerHeight,-2000,2000);camera3.position.z=800;
scene3.add(new THREE.AmbientLight(0xfff8ee,1.35));
const light3=new THREE.PointLight(0xffe9d5,1.55,1800);scene3.add(light3);
const fill3=new THREE.PointLight(0xbddbd3,.9,1600);scene3.add(fill3);
const rose3=new THREE.PointLight(0xe8b6b2,.58,1400);scene3.add(rose3);

function makeSoftTexture(){
  const textureCanvas=document.createElement('canvas');textureCanvas.width=textureCanvas.height=64;
  const paint=textureCanvas.getContext('2d');
  const glow=paint.createRadialGradient(32,32,0,32,32,31);
  glow.addColorStop(0,'rgba(255,255,255,.92)');glow.addColorStop(.34,'rgba(244,238,226,.55)');glow.addColorStop(1,'rgba(255,255,255,0)');
  paint.fillStyle=glow;paint.fillRect(0,0,64,64);
  const texture=new THREE.CanvasTexture(textureCanvas);texture.minFilter=THREE.LinearFilter;return texture;
}

const makeOrbGroup=(typeIndex)=>{
  const group=new THREE.Group();
  if(typeIndex===0){
    const coreMaterial=new THREE.MeshPhysicalMaterial({color:0xdbece6,roughness:.12,metalness:0,transmission:.72,thickness:.8,ior:1.27,clearcoat:.55,clearcoatRoughness:.18,transparent:true,opacity:0,depthWrite:false,depthTest:false,emissive:0x6e8e87,emissiveIntensity:.035});
    const core=new THREE.Mesh(new THREE.SphereGeometry(1,36,28),coreMaterial);group.add(core);
    const innerMaterial=new THREE.MeshBasicMaterial({color:0xf6dfd5,transparent:true,opacity:0,depthWrite:false,depthTest:false});
    const inner=new THREE.Mesh(new THREE.SphereGeometry(.58,24,18),innerMaterial);group.add(inner);
    group._orb={type:'crystal',materials:[coreMaterial,innerMaterial]};
  }else{
    const fuzzCount=190,fuzzPositions=new Float32Array(fuzzCount*3),golden=Math.PI*(3-Math.sqrt(5));
    for(let i=0;i<fuzzCount;i++){
      const y=1-(i/(fuzzCount-1))*2,radius=Math.sqrt(1-y*y),theta=golden*i,shell=1.04+(i%13)*.012;
      fuzzPositions[i*3]=Math.cos(theta)*radius*shell;fuzzPositions[i*3+1]=y*shell;fuzzPositions[i*3+2]=Math.sin(theta)*radius*shell;
    }
    const fuzzGeometry=new THREE.BufferGeometry();fuzzGeometry.setAttribute('position',new THREE.BufferAttribute(fuzzPositions,3));
    const fuzzMaterial=new THREE.PointsMaterial({color:0xe8eee7,map:makeSoftTexture(),size:7,sizeAttenuation:false,transparent:true,opacity:0,alphaTest:.01,depthWrite:false,depthTest:false,blending:THREE.NormalBlending});
    const fuzz=new THREE.Points(fuzzGeometry,fuzzMaterial);group.add(fuzz);
    group._orb={type:'fuzzy',materials:[fuzzMaterial]};
  }
  group.visible=false;scene3.add(group);return group;
};
const orbGroups=[makeOrbGroup(0),makeOrbGroup(1)];
let orbGroup=orbGroups[0];

const nailColors=[0xe4beb5,0xd8c8b9,0xb9d1ca,0xe1c0c4,0xc8c7ad];
const nailGeometry=new THREE.SphereGeometry(1,28,18);
const nails=nailColors.map(color=>{
  const material=new THREE.MeshPhysicalMaterial({color,roughness:.28,metalness:0,transmission:.32,thickness:.26,ior:1.38,clearcoat:.5,clearcoatRoughness:.2,transparent:true,opacity:0,depthWrite:false,depthTest:false,emissive:color,emissiveIntensity:.035});
  const nail=new THREE.Mesh(nailGeometry,material);nail.visible=false;scene3.add(nail);return nail;
});
const orbPosition=new THREE.Vector3(),targetPosition=new THREE.Vector3();

function resize(){
  dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
  renderer3.setSize(W,H,false);camera3.right=W;camera3.bottom=H;camera3.updateProjectionMatrix();
  light3.position.set(W*.3,H*.18,560);fill3.position.set(W*.8,H*.52,440);rose3.position.set(W*.82,H*.75,320);
}
addEventListener('resize',resize);resize();
const map=p=>({x:(mirrored?1-p.x:p.x)*W,y:p.y*H,z:p.z||0});

function beginExperience(){
  experienceAlpha=0;focusIndex=0;focusProgress=0;cycleComplete=false;completeAt=0;orbInitialized=false;orbTrail.length=0;
  orbTypeIndex=Math.floor(Math.random()*orbGroups.length);orbGroup=orbGroups[orbTypeIndex];orbTypeChangeTime=performance.now();
  nailReveal.fill(0);nailTargets.fill(0);clearTimeout(reflectionTimer);reflection.classList.remove('is-visible');
}

function update(raw){
  const next=raw.map(map);
  if(!points){points=next;motion=.5}
  else{
    motion=next.reduce((sum,p,i)=>sum+Math.hypot(p.x-points[i].x,p.y-points[i].y),0)/(21*Math.max(W,H));
    points=next.map((p,i)=>({x:lerp(points[i].x,p.x,.44),y:lerp(points[i].y,p.y,.44),z:lerp(points[i].z,p.z,.44)}));
  }
  lastSeen=performance.now();
  if(!hadHand){beginExperience();hadHand=true}
  hideInvitation();
}

function handScale(){return Math.max(46,Math.hypot(points[0].x-points[9].x,points[0].y-points[9].y))}

function nailPose(index){
  const tip=points[nailTips[index]],base=points[nailBases[index]],dx=tip.x-base.x,dy=tip.y-base.y,dz=(tip.z-base.z)||0;
  const segment=Math.max(14,Math.hypot(dx,dy));
  return {x:lerp(base.x,tip.x,.79),y:lerp(base.y,tip.y,.79),z:-lerp(base.z,tip.z,.79)*260+34,angle:Math.atan2(dy,dx)-Math.PI/2,length:segment*.7,width:segment*(index===0?.48:.42),depth:Math.max(2.2,segment*.1),dx,dy,dz};
}

function focusTarget(){
  if(focusIndex===0){
    const ids=[0,5,9,13,17],p=ids.reduce((sum,id)=>({x:sum.x+points[id].x,y:sum.y+points[id].y,z:sum.z+points[id].z}),{x:0,y:0,z:0});
    targetPosition.set(p.x/ids.length,p.y/ids.length,-(p.z/ids.length)*260+26);
  }else{
    const pose=nailPose(Math.min(4,focusIndex-1));targetPosition.set(pose.x,pose.y,pose.z+18);
  }
  return targetPosition;
}

function updateFocus(t,dt){
  if(cycleComplete)return;
  const stillness=1-smoothstep(.0014,.009,motion);
  focusProgress+=dt*(.45+.55*stillness)/1.35;
  if(focusProgress<1)return;
  if(focusIndex>0)nailTargets[focusIndex-1]=1;
  focusIndex+=1;focusProgress=0;
  if(focusIndex>5){focusIndex=5;cycleComplete=true;completeAt=t;showReflection()}
}

function showInvitation(message='手を、ひらいてください'){
  invitation.textContent=message;invitation.classList.add('is-visible');
}
function hideInvitation(){invitation.classList.remove('is-visible')}
function showReflection(){
  reflection.classList.add('is-visible');clearTimeout(reflectionTimer);
  reflectionTimer=setTimeout(()=>reflection.classList.remove('is-visible'),5200);
}

function updateOrb(t,dt,visible){
  if(!points||experienceAlpha<=0){orbGroups.forEach(g=>g.visible=false);return}
  if(t-orbTypeChangeTime>4800&&Math.random()>.7){
    orbGroup.visible=false;
    orbTypeIndex=(orbTypeIndex+1)%orbGroups.length;
    orbGroup=orbGroups[orbTypeIndex];
    orbTypeChangeTime=t;
  }
  const target=focusTarget();
  if(!orbInitialized){orbPosition.copy(target);orbInitialized=true}
  else orbPosition.lerp(target,1-Math.exp(-dt*4.5));
  const guideFade=cycleComplete?clamp(1-(t-completeAt)/3600):1;
  const visibility=experienceAlpha*guideFade;
  const radius=handScale()*.17*(1+Math.sin(t*.00155)*.045);
  orbGroup.visible=visibility>.01;orbGroup.position.copy(orbPosition);orbGroup.scale.setScalar(radius);
  orbGroup.rotation.y=t*.00018;orbGroup.rotation.x=Math.sin(t*.00033)*.12;
  orbGroup._orb.materials.forEach(m=>m.opacity=m.constructor.name==='PointsMaterial'?.38*visibility:.36*visibility);
  if(orbGroup._orb.materials.length>1)orbGroup._orb.materials[1].opacity=.15*visibility;
  orbGroup._orb.materials.forEach(m=>{if(m.size)m.size=5.5+radius*.055});
  if(visible&&visibility>.08&&t-orbTrailTime>58){
    orbTrailTime=t;orbTrail.push({x:orbPosition.x,y:orbPosition.y,life:.92*visibility});if(orbTrail.length>100)orbTrail.shift();
  }
}

function updateNails(dt){
  nails.forEach((nail,index)=>{
    nailReveal[index]+=((nailTargets[index]-nailReveal[index])*(1-Math.pow(.06,dt)));
    const alpha=nailReveal[index]*experienceAlpha;
    if(!points||alpha<.005){nail.visible=false;return}
    const pose=nailPose(index),growth=.62+.38*smoothstep(0,1,nailReveal[index]);
    nail.visible=true;nail.position.set(pose.x,pose.y,pose.z);nail.rotation.set(0,0,pose.angle);
    nail.scale.set(pose.width*growth,pose.length*growth,pose.depth*growth);
    nail.material.opacity=.76*alpha;nail.material.emissiveIntensity=.02+.035*alpha;
  });
}

function drawOrbTrail(dt){
  ctx.clearRect(0,0,W,H);
  if(orbTrail.length>1){
    ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();
    orbTrail.forEach((point,index)=>{index?ctx.lineTo(point.x,point.y):ctx.moveTo(point.x,point.y)});
    const average=orbTrail.reduce((sum,point)=>sum+point.life,0)/orbTrail.length;
    ctx.strokeStyle=`rgba(120,151,143,${average*.2*experienceAlpha})`;ctx.lineWidth=1.15;ctx.shadowColor='rgba(229,238,230,.45)';ctx.shadowBlur=6;ctx.stroke();ctx.restore();
  }
  orbTrail.forEach(point=>point.life-=dt*(cycleComplete?.34:.115));
  while(orbTrail.length&&orbTrail[0].life<=0)orbTrail.shift();
}

function draw(t){
  const dt=lastFrame?clamp((t-lastFrame)/1000,0,.05):.016;lastFrame=t;
  const visible=running&&points&&performance.now()-lastSeen<720;
  if(visible){
    experienceAlpha=clamp(experienceAlpha+dt*1.2);updateFocus(t,dt);
  }else if(hadHand){
    experienceAlpha=clamp(experienceAlpha-dt*.22);
    if(experienceAlpha===0){
      hadHand=false;points=null;beginExperience();showInvitation();
    }
  }
  updateOrb(t,dt,visible);updateNails(dt);drawOrbTrail(dt);renderer3.render(scene3,camera3);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.65,minTrackingConfidence:.65});
hands.onResults(r=>{if(r.multiHandLandmarks?.length)update(r.multiHandLandmarks[0])});
async function loop(){if(running&&video.readyState>=2&&!processing){processing=true;try{await hands.send({image:video})}catch(e){}processing=false}requestAnimationFrame(loop)}

async function useCamera(deviceId=''){
  if(video.srcObject)video.srcObject.getTracks().forEach(track=>track.stop());
  const videoOptions=deviceId?{deviceId:{exact:deviceId},width:{ideal:1280},height:{ideal:720}}:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}};
  const stream=await navigator.mediaDevices.getUserMedia({video:videoOptions,audio:false});
  video.srcObject=stream;await video.play();
  const settings=stream.getVideoTracks()[0].getSettings();
  currentDeviceId=settings.deviceId||deviceId;
  currentFacingMode=settings.facingMode||'';mirrored=currentFacingMode==='user';
  video.style.transform=mirrored?'scaleX(-1)':'none';
  points=null;hadHand=false;beginExperience();
}

async function chooseRearCamera(){
  const devices=(await navigator.mediaDevices.enumerateDevices()).filter(device=>device.kind==='videoinput');
  if(devices.length<2)return;
  if(currentFacingMode!=='environment'){
    const rear=devices.find(device=>/(back|rear|environment|背面|外側)/i.test(device.label))||devices.find(device=>!/(front|user|前面|内側)/i.test(device.label)&&device.deviceId!==currentDeviceId);
    if(rear&&rear.deviceId!==currentDeviceId)await useCamera(rear.deviceId);
  }
  cameraSwitch.classList.add('is-ready');clearTimeout(cameraSwitchTimer);
  cameraSwitchTimer=setTimeout(()=>cameraSwitch.classList.add('is-dim'),5200);
}

cameraSwitch.onclick=async()=>{
  const devices=(await navigator.mediaDevices.enumerateDevices()).filter(device=>device.kind==='videoinput');
  if(devices.length<2)return;
  const index=devices.findIndex(device=>device.deviceId===currentDeviceId);
  cameraSwitch.classList.remove('is-dim');
  try{await useCamera(devices[(index+1+devices.length)%devices.length].deviceId);showInvitation()}
  catch(e){showInvitation('カメラを切り替えられませんでした')}
};

startButton.onclick=async()=>{
  startButton.disabled=true;startMessage.textContent='カメラを準備しています';
  try{
    await useCamera();await chooseRearCamera();running=true;loop();startMessage.textContent='';startScreen.classList.add('is-leaving');
    setTimeout(()=>showInvitation(),1300);
  }catch(e){
    startButton.disabled=false;
    startMessage.textContent='カメラを使用できませんでした。Safariの設定で、カメラの使用を許可してください。';
  }
};
</script>
</body>
</html>
