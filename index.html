<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>HAND / MATERIAL</title>
<style>
:root{--paper:#e9e5de;--ink:#17191c}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0c0d0f;color:var(--paper)}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;touch-action:none}
#camera,#art,#three{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
#camera{filter:saturate(.62) contrast(1.08) brightness(.72)}
#art{mix-blend-mode:normal}
#shade{position:fixed;inset:0;background:radial-gradient(circle at 50% 45%,transparent 10%,rgba(5,7,9,.2) 52%,rgba(3,4,6,.78) 100%);pointer-events:none}
#top{position:fixed;left:20px;right:20px;top:max(18px,env(safe-area-inset-top));display:flex;justify-content:space-between;align-items:center;z-index:3;letter-spacing:.19em;font-size:10px}
#state{opacity:.62}
#camera-switch{font:inherit;color:inherit;background:rgba(10,12,14,.28);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:7px 11px;letter-spacing:.12em;display:none}
#caption{position:fixed;left:20px;bottom:max(23px,env(safe-area-inset-bottom));z-index:3;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:18px;letter-spacing:.14em}
#caption small{display:block;margin-top:8px;font-family:sans-serif;font-size:9px;letter-spacing:.15em;opacity:.48}
#modes{position:fixed;right:18px;bottom:max(25px,env(safe-area-inset-bottom));z-index:4;display:flex;gap:10px}
.mode{width:9px;height:9px;border:1px solid rgba(255,255,255,.5);border-radius:50%;background:transparent;padding:0}
.mode.on{background:var(--paper);box-shadow:0 0 15px rgba(220,238,242,.8)}
#start{position:fixed;inset:0;z-index:10;display:grid;place-items:center;background:#111316}
#start-inner{text-align:center;padding:32px}
#start h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-weight:400;font-size:24px;letter-spacing:.2em;margin:0 0 18px}
#start p{font-size:11px;line-height:2;letter-spacing:.12em;opacity:.56;margin:0 0 30px}
#start button{font:inherit;color:inherit;background:transparent;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:13px 36px;letter-spacing:.2em}
#gesture{position:fixed;inset:0;z-index:2}
</style>
</head>
<body>
<video id="camera" autoplay muted playsinline></video>
<canvas id="three"></canvas>
<canvas id="art"></canvas>
<div id="shade"></div>
<div id="gesture"></div>
<header id="top"><span>HAND / MATERIAL</span><span style="display:flex;align-items:center;gap:10px"><span id="state">待機中</span><button id="camera-switch">カメラ切替</button></span></header>
<div id="caption">立体作品<small>指で画面をなぞると質感が変わります</small></div>
<div id="modes" aria-label="表現切替">
  <button class="mode on" data-mode="membrane" aria-label="立体作品"></button>
  <button class="mode" data-mode="line" aria-label="線"></button>
  <button class="mode" data-mode="trace" aria-label="残像"></button>
</div>
<div id="start"><div id="start-inner">
  <h1>手を、かざす</h1>
  <p>カメラの前で手をゆっくり動かしてください。<br>説明はありません。近づけて、角度を変えて見てください。</p>
  <button id="start-button">はじめる</button>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const video=document.querySelector('#camera');
const canvas=document.querySelector('#art');
const ctx=canvas.getContext('2d');
const threeCanvas=document.querySelector('#three');
const state=document.querySelector('#state');
const caption=document.querySelector('#caption');
let W=0,H=0,dpr=1,mode='membrane',strength=.82,flow=.55,running=false,processing=false,mirrored=false,currentDeviceId='';
let points=null,previous=null,lastSeen=0;
let materialization=0,motion=.5,hadHand=false;
const trails=Array.from({length:5},()=>[]);
const fingers=[[0,1,2,3,4],[0,5,6,7,8],[0,9,10,11,12],[0,13,14,15,16],[0,17,18,19,20]];
const palm=[0,1,5,9,13,17,0];
const bones=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

// ---------- 3D artwork tracking rig ----------
const renderer3=new THREE.WebGLRenderer({canvas:threeCanvas,alpha:true,antialias:true});
renderer3.setPixelRatio(Math.min(devicePixelRatio||1,2));
renderer3.outputEncoding=THREE.sRGBEncoding;
const scene3=new THREE.Scene();
const camera3=new THREE.OrthographicCamera(0,innerWidth,0,innerHeight,-2000,2000);camera3.position.z=800;
scene3.add(new THREE.AmbientLight(0xbfe3ea,1.15));
const light3=new THREE.PointLight(0xd9f8ff,2.5,1800);light3.position.set(innerWidth*.35,innerHeight*.25,500);scene3.add(light3);
const rim3=new THREE.PointLight(0xffd9e7,1.6,1600);rim3.position.set(innerWidth*.8,innerHeight*.65,350);scene3.add(rim3);
const artworkRoot=new THREE.Group();scene3.add(artworkRoot);
const artworkAnchors=Array.from({length:21},()=>{const anchor=new THREE.Group();artworkRoot.add(anchor);return anchor});
let attachedArtwork=null;
const handMaterial=new THREE.MeshPhysicalMaterial({color:0xa9dce2,roughness:.16,metalness:.04,transmission:.48,thickness:1.2,ior:1.42,transparent:true,opacity:.78,emissive:0x225f68,emissiveIntensity:.45,depthWrite:false});
const fallbackArtwork=new THREE.Group();artworkRoot.add(fallbackArtwork);
const jointMeshes=Array.from({length:21},(_,i)=>{const mesh=new THREE.Mesh(new THREE.SphereGeometry(i===0?1.25:1,14,10),handMaterial);fallbackArtwork.add(mesh);return mesh});
const boneMeshes=bones.map(()=>{const mesh=new THREE.Mesh(new THREE.CylinderGeometry(1,1,1,12,1),handMaterial);fallbackArtwork.add(mesh);return mesh});
const palmMesh=new THREE.Mesh(new THREE.SphereGeometry(1,20,14),handMaterial);fallbackArtwork.add(palmMesh);
const up3=new THREE.Vector3(0,1,0),a3=new THREE.Vector3(),b3=new THREE.Vector3(),mid3=new THREE.Vector3(),dir3=new THREE.Vector3(),q3=new THREE.Quaternion();

// Blender作品を接続するための入口。21個のanchorがMediaPipeの関節と同じ順番で動く。
window.attachHandArtwork=(object3D)=>{
  if(attachedArtwork)artworkRoot.remove(attachedArtwork);
  attachedArtwork=object3D||null;
  fallbackArtwork.visible=!attachedArtwork;
  if(attachedArtwork)artworkRoot.add(attachedArtwork);
  return {root:artworkRoot,anchors:artworkAnchors};
};
window.handArtworkRig={root:artworkRoot,anchors:artworkAnchors,attach:window.attachHandArtwork};

const artworkMaterials=[];
new THREE.GLTFLoader().load('assets/grasping-hand.glb',gltf=>{
  const model=gltf.scene;
  const box=new THREE.Box3().setFromObject(model),size=box.getSize(new THREE.Vector3()),center=box.getCenter(new THREE.Vector3());
  model.traverse(child=>{
    if(!child.isMesh)return;
    child.material=child.material.clone();
    child.material.color.set(0xb8d2d3);
    child.material.roughness=.34;
    child.material.metalness=.08;
    child.material.transparent=true;
    child.material.opacity=0;
    child.material.depthWrite=false;
    artworkMaterials.push(child.material);
  });
  const holder=new THREE.Group(),centeredModel=new THREE.Group();
  centeredModel.position.copy(center).multiplyScalar(-1);
  // この作品は前腕が長いため、外接箱の中心ではなく手のひらを追跡位置へ合わせる。
  centeredModel.position.y+=size.y*.18;
  centeredModel.add(model);holder.add(centeredModel);
  holder.userData.updateHandPose=(pose)=>{
    const p0=pose.points[0],p9=pose.points[9],p5=pose.points[5],p17=pose.points[17];
    const palmX=(p0.x+p5.x+p9.x+p17.x)/4,palmY=(p0.y+p5.y+p9.y+p17.y)/4;
    const targetHeight=pose.handScale*3.25,scale=targetHeight/Math.max(size.y,size.z);
    holder.position.set(palmX,palmY,-p9.z*260+8);
    holder.rotation.z=Math.atan2(p9.y-p0.y,p9.x-p0.x)-Math.PI/2;
    holder.scale.setScalar(scale);
    artworkMaterials.forEach(material=>material.opacity=pose.materialization*(.28+strength*.68));
  };
  attachHandArtwork(holder);
},undefined,()=>{state.textContent='3D作品を読み込めません'});

function update3DHand(){
  if(!points)return;
  const handScale=Math.max(42,Math.hypot(points[0].x-points[9].x,points[0].y-points[9].y));
  const radius=handScale*.075;
  jointMeshes.forEach((mesh,i)=>{const p=points[i];mesh.position.set(p.x,p.y,-p.z*260);mesh.scale.setScalar(radius*(i===0?1.05:.78));artworkAnchors[i].position.copy(mesh.position)});
  bones.forEach(([a,b],i)=>{const p1=points[a],p2=points[b];a3.set(p1.x,p1.y,-p1.z*260);b3.set(p2.x,p2.y,-p2.z*260);mid3.addVectors(a3,b3).multiplyScalar(.5);dir3.subVectors(b3,a3);const len=dir3.length();boneMeshes[i].position.copy(mid3);boneMeshes[i].scale.set(radius*(a===0?1.18:.72),len,radius*(a===0?1.18:.72));q3.setFromUnitVectors(up3,dir3.normalize());boneMeshes[i].setRotationFromQuaternion(q3)});
  fingers.forEach(finger=>finger.slice(0,-1).forEach((index,j)=>{const next=finger[j+1];dir3.subVectors(artworkAnchors[next].position,artworkAnchors[index].position).normalize();q3.setFromUnitVectors(up3,dir3);artworkAnchors[index].quaternion.copy(q3)}));
  const centerX=(points[0].x+points[9].x+points[13].x)/3,centerY=(points[0].y+points[9].y+points[13].y)/3;
  const angle=Math.atan2(points[9].y-points[0].y,points[9].x-points[0].x)-Math.PI/2;
  palmMesh.position.set(centerX,centerY,-points[9].z*260+3);palmMesh.rotation.z=angle;palmMesh.scale.set(handScale*.34,handScale*.48,radius*1.7);
  handMaterial.opacity=materialization*(.08+materialization*.72)*strength;handMaterial.emissiveIntensity=.18+materialization*.7;
  artworkRoot.userData.pose={points,handScale,radius,materialization};
  if(attachedArtwork?.userData?.updateHandPose)attachedArtwork.userData.updateHandPose(artworkRoot.userData.pose,artworkAnchors);
}

function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);renderer3.setSize(W,H,false);camera3.right=W;camera3.bottom=H;camera3.updateProjectionMatrix()}
addEventListener('resize',resize);resize();
const map=p=>({x:(mirrored?1-p.x:p.x)*W,y:p.y*H,z:p.z||0});
const lerp=(a,b,t)=>a+(b-a)*t;

function update(raw){
  const next=raw.map(map);
  if(!points){points=next;motion=.5}
  else{
    motion=next.reduce((sum,p,i)=>sum+Math.hypot(p.x-points[i].x,p.y-points[i].y),0)/(21*Math.max(W,H));
    points=next.map((p,i)=>({x:lerp(points[i].x,p.x,.48),y:lerp(points[i].y,p.y,.48),z:lerp(points[i].z,p.z,.48)}));
  }
  previous=next;lastSeen=performance.now();
  if(!hadHand){materialization=0;hadHand=true}
  [4,8,12,16,20].forEach((tip,i)=>{trails[i].unshift({...points[tip],life:1});trails[i]=trails[i].slice(0,32)});
}

function path(indices){ctx.beginPath();indices.forEach((n,i)=>{const p=points[n];i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});}
function glowPath(indices,width,color,blur=18){ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=color;ctx.lineWidth=width;ctx.shadowColor=color;ctx.shadowBlur=blur;path(indices);ctx.stroke();ctx.restore()}
function drawLine(t){
  ctx.save();ctx.globalCompositeOperation='screen';
  for(let layer=0;layer<5;layer++){
    const drift=Math.sin(t*.001+layer)*layer*1.8;
    ctx.save();ctx.translate(drift,-drift*.4);ctx.setLineDash(layer%2?[2,5]:[]);
    fingers.forEach(f=>glowPath(f,.65+layer*.24,`rgba(238,224,207,${(.58-layer*.075)*strength})`,layer*2));ctx.restore();
  }
  path(palm);ctx.closePath();ctx.strokeStyle=`rgba(225,210,194,${.5*strength})`;ctx.lineWidth=.8;ctx.stroke();ctx.restore();
}

function drawTrace(){
  ctx.save();ctx.globalCompositeOperation='lighter';
  trails.forEach((trail,i)=>{
    if(trail.length<2)return;ctx.beginPath();trail.forEach((p,j)=>{j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});
    const hue=185+i*8;ctx.strokeStyle=`hsla(${hue},45%,78%,${.52*strength})`;ctx.lineWidth=1.2;ctx.shadowColor=`hsla(${hue},60%,75%,.8)`;ctx.shadowBlur=13;ctx.stroke();
    trail.forEach(p=>p.life*=.955);
  });
  fingers.forEach(f=>glowPath(f,.7,'rgba(244,235,224,.38)',4));ctx.restore();
}

function draw(t){
  ctx.clearRect(0,0,W,H);ctx.fillStyle=`rgba(5,7,9,${.035+flow*.05})`;ctx.fillRect(0,0,W,H);
  const visible=points&&performance.now()-lastSeen<700;
  if(visible){
    // 静かな手ほど物質化が深く進み、動かすと少し揺らぐ
    const stillness=Math.max(0,1-motion*42);
    materialization=Math.min(1,materialization+.008+stillness*.014);
    if(materialization<.3)state.textContent='膜が生まれています';
    else if(materialization<.78)state.textContent='手をゆっくり動かしてください';
    else state.textContent='物質化';
  }else{
    materialization=Math.max(0,materialization-.035);
    if(materialization===0)hadHand=false;
  }
  threeCanvas.style.display=mode==='membrane'?'block':'none';
  if(points&&materialization>0){
    ctx.save();ctx.globalAlpha=.08+materialization*.92;
    if(mode==='line')drawLine(t);if(mode==='trace')drawTrace();ctx.restore();
  }
  scene3.visible=mode==='membrane'&&materialization>0;update3DHand();renderer3.render(scene3,camera3);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.65,minTrackingConfidence:.65});
hands.onResults(r=>{if(r.multiHandLandmarks?.length){update(r.multiHandLandmarks[0])}else if(performance.now()-lastSeen>650){state.textContent='手をかざしてください'}});
async function loop(){if(running&&video.readyState>=2&&!processing){processing=true;try{await hands.send({image:video})}catch(e){}processing=false}requestAnimationFrame(loop)}

async function useCamera(deviceId=''){
  if(video.srcObject)video.srcObject.getTracks().forEach(track=>track.stop());
  const videoOptions=deviceId?{deviceId:{exact:deviceId},width:{ideal:1280},height:{ideal:720}}:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}};
  const stream=await navigator.mediaDevices.getUserMedia({video:videoOptions,audio:false});
  video.srcObject=stream;await video.play();
  const settings=stream.getVideoTracks()[0].getSettings();
  currentDeviceId=settings.deviceId||deviceId;
  mirrored=settings.facingMode==='user';
  video.style.transform=mirrored?'scaleX(-1)':'none';
  points=null;
}

async function chooseRearCamera(){
  const devices=(await navigator.mediaDevices.enumerateDevices()).filter(device=>device.kind==='videoinput');
  if(devices.length<2)return;
  const rear=devices.find(device=>/(back|rear|environment|背面|外側)/i.test(device.label))||devices.find(device=>!/(front|user|前面|内側)/i.test(device.label)&&device.deviceId!==currentDeviceId);
  if(rear&&rear.deviceId!==currentDeviceId)await useCamera(rear.deviceId);
  document.querySelector('#camera-switch').style.display='inline-block';
}

document.querySelector('#camera-switch').onclick=async()=>{
  const devices=(await navigator.mediaDevices.enumerateDevices()).filter(device=>device.kind==='videoinput');
  if(devices.length<2)return;
  const index=devices.findIndex(device=>device.deviceId===currentDeviceId);
  state.textContent='カメラ切替中';
  try{await useCamera(devices[(index+1+devices.length)%devices.length].deviceId);state.textContent=mirrored?'内側カメラ':'外側カメラ'}catch(e){state.textContent='切替できません'}
};

document.querySelector('#start-button').onclick=async()=>{
  state.textContent='カメラを準備しています';
  try{await useCamera();await chooseRearCamera();document.querySelector('#start').remove();running=true;state.textContent=mirrored?'内側カメラ':'外側カメラ';loop()}catch(e){state.textContent='カメラを使用できません';alert('Safariのカメラ使用を許可してください')}
};

const labels={membrane:'立体作品',line:'線',trace:'残像'};
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('on',x===b));caption.childNodes[0].nodeValue=labels[mode];trails.forEach(t=>t.length=0)});

let startTouch=null;
const gesture=document.querySelector('#gesture');
gesture.addEventListener('pointerdown',e=>{startTouch={x:e.clientX,y:e.clientY,s:strength,f:flow};gesture.setPointerCapture(e.pointerId)});
gesture.addEventListener('pointermove',e=>{if(!startTouch)return;strength=Math.max(.15,Math.min(1,startTouch.s+(e.clientX-startTouch.x)/W));flow=Math.max(.05,Math.min(1,startTouch.f-(e.clientY-startTouch.y)/H));});
gesture.addEventListener('pointerup',()=>startTouch=null);
</script>
</body>
</html>
